<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="300" fill="black"/>

  <!-- ===== GLOW ===== -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== STAR FIELD (TWINKLING + GLOWING) ===== -->
  <g filter="url(#glow)">

    <!-- WHITE -->
    <circle cx="20" cy="20" r="1" fill="#ffffff">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="100" cy="60" r="1" fill="#ffffff">
      <animate attributeName="opacity" values="1;0.1;1" dur="1.7s" repeatCount="indefinite"/>
    </circle>

    <circle cx="260" cy="80" r="1" fill="#ffffff">
      <animate attributeName="r" values="1;2;1" dur="2.1s" repeatCount="indefinite"/>
    </circle>

     <circle cx="290" cy="70" r="1" fill="#ffffff">
      <animate attributeName="r" values="1;2;1" dur="2.1s" repeatCount="indefinite"/>
    </circle>

    <!-- VIOLET -->
    <circle cx="220" cy="110" r="1.2" fill="#8a2be2">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="540" cy="100" r="1.2" fill="#8a2be2">
      <animate attributeName="r" values="1.2;2.2;1.2" dur="1.9s" repeatCount="indefinite"/>
    </circle>

    <!-- YELLOW -->
    <circle cx="300" cy="90" r="1.3" fill="#ffff66">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="620" cy="20" r="1.3" fill="#ffff66">
      <animate attributeName="r" values="1.3;2.5;1.3" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- ORANGE -->
    <circle cx="280" cy="60" r="1.3" fill="#ff9900">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>

    <!-- RED -->
    <circle cx="360" cy="110" r="1.4" fill="#ff3333">
      <animate attributeName="r" values="1.4;2.8;1.4" dur="2.2s" repeatCount="indefinite"/>
    </circle>

    <!-- EXTRA -->
    <circle cx="700" cy="70" r="1" fill="#ffffff">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="480" cy="40" r="1" fill="#ff9900">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.7s" repeatCount="indefinite"/>
    </circle>

  </g>

  <!-- ===== METEORS ===== -->

<!-- Meteor 1 -->
<line x1="100" y1="50" x2="140" y2="80"
      stroke="#ffffff"
      stroke-width="1.2"
      opacity="0">
  <animate attributeName="opacity"
           values="0;1;0"
           dur="3s"
           repeatCount="indefinite"/>
  <animate attributeName="x1"
           values="100;300"
           dur="3s"
           repeatCount="indefinite"/>
  <animate attributeName="y1"
           values="50;200"
           dur="3s"
           repeatCount="indefinite"/>
  <animate attributeName="x2"
           values="140;340"
           dur="3s"
           repeatCount="indefinite"/>
  <animate attributeName="y2"
           values="80;230"
           dur="3s"
           repeatCount="indefinite"/>
</line>

<!-- Meteor 2 -->
<line x1="500" y1="20" x2="530" y2="50"
      stroke="#ffff66"
      stroke-width="1"
      opacity="0">
  <animate attributeName="opacity"
           values="0;1;0"
           dur="4.5s"
           repeatCount="indefinite"/>
  <animate attributeName="x1"
           values="500;700"
           dur="4.5s"
           repeatCount="indefinite"/>
  <animate attributeName="y1"
           values="20;180"
           dur="4.5s"
           repeatCount="indefinite"/>
  <animate attributeName="x2"
           values="530;730"
           dur="4.5s"
           repeatCount="indefinite"/>
  <animate attributeName="y2"
           values="50;210"
           dur="4.5s"
           repeatCount="indefinite"/>
</line>

<!-- Meteor 3 -->
<line x1="250" y1="10" x2="280" y2="40"
      stroke="#ff9900"
      stroke-width="1"
      opacity="0">
  <animate attributeName="opacity"
           values="0;1;0"
           dur="5.5s"
           repeatCount="indefinite"/>
  <animate attributeName="x1"
           values="250;450"
           dur="5.5s"
           repeatCount="indefinite"/>
  <animate attributeName="y1"
           values="10;160"
           dur="5.5s"
           repeatCount="indefinite"/>
  <animate attributeName="x2"
           values="280;480"
           dur="5.5s"
           repeatCount="indefinite"/>
  <animate attributeName="y2"
           values="40;190"
           dur="5.5s"
           repeatCount="indefinite"/>
</line>

  <!-- ===== HARMONIC SIGNALS ===== -->

  <!-- fundamental -->
  <path d="M0 200 Q 80 140, 160 200 T 320 200 T 480 200 T 640 200 T 800 200"
        stroke="#ffff66"
        stroke-width="2"
        fill="none"
        stroke-dasharray="6">
    <animate attributeName="stroke-dashoffset" from="0" to="20" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- harmonic 1 -->
  <path d="M0 200 Q 80 170, 160 200 T 320 200 T 480 200 T 640 200 T 800 200"
        stroke="#ff9900"
        stroke-width="1.5"
        fill="none"
        opacity="0.6"
        stroke-dasharray="5">
    <animate attributeName="stroke-dashoffset" from="0" to="20" dur="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- harmonic 2 -->
  <path d="M0 200 Q 80 230, 160 200 T 320 200 T 480 200 T 640 200 T 800 200"
        stroke="#8a2be2"
        stroke-width="1.5"
        fill="none"
        opacity="0.6"
        stroke-dasharray="5">
    <animate attributeName="stroke-dashoffset" from="0" to="20" dur="1.8s" repeatCount="indefinite"/>
  </path>

  <!-- harmonic 3 -->
  <path d="M0 200 Q 80 120, 160 200 T 320 200 T 480 200 T 640 200 T 800 200"
        stroke="#ff3333"
        stroke-width="1"
        fill="none"
        opacity="0.4"
        stroke-dasharray="4">
    <animate attributeName="stroke-dashoffset" from="0" to="20" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- ===== MOVING SIGNAL PACKET ===== -->
  <circle r="3" fill="#ffffff">
    <animateMotion dur="3s" repeatCount="indefinite"
      path="M0 200 Q 80 140, 160 200 T 320 200 T 480 200 T 640 200 T 800 200"/>
  </circle>

  <!-- ===== NAME ===== -->
  <text x="50%" y="120"
        text-anchor="middle"
        fill="#ffffff"
        font-size="45"
        font-family="Helvetica, sans-serif"
        font-style=""
        letter-spacing="2"
        filter="url(#glow)">
    Akhilesh R
  </text>

  <!-- ===== SUBTEXT ===== -->
  <text x="50%" y="140"
        text-anchor="middle"
        fill="#dddddd"
        opacity="0.8"
        font-size="11"
        font-family="Times New Roman, serif"
        font-style="italic">
    RF Engineering • Electronics • Astronomy • Artificial Intelligence • Machine Learning
  </text>

</svg>
